name: Searcade Auto Login

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  login_job:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: 执行登录脚本
        env:
          SEARCADE_EMAIL: ${{ secrets.SEARCADE_EMAIL }}
          SEARCADE_PASSWORD: ${{ secrets.SEARCADE_PASSWORD }}
        run: python main.py
