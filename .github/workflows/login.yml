name: Searcade Auto Login

on:
  schedule:
    - cron: '0 0 */3 * *'
  workflow_dispatch:

jobs:
  login_job:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖和 Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64 libatspi2.0-0 libxshmfence1
          
          python -m pip install --upgrade pip
          pip install playwright playwright-stealth
          playwright install chromium --with-deps

      - name: 执行登录脚本
        env:
          SEARCADE_EMAIL: ${{ secrets.SEARCADE_EMAIL }}
          SEARCADE_PASSWORD: ${{ secrets.SEARCADE_PASSWORD }}
        run: python main.py

      - name: 保存截图到 Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: searcade-login-results-${{ github.run_id }}
          path: |
            before_login.png
            after_login.png
            error_state.png
          retention-days: 7
